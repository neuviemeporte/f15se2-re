name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  greenfield:
    runs-on: ubuntu-latest
    container:
      image: ajenbo/iskukotka:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup toolchain and reference binaries
        run: ln -s /opt/f15se2/dos

      - name: Build main target
        run: make -j

      - name: Build debug
        run: make -j$(nproc) debug

      - name: Build noasm
        run: make -j$(nproc) noasm-start noasm-end        

  verify:
    runs-on: ubuntu-latest
    container:
      image: ajenbo/iskukotka:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup toolchain and reference binaries
        run: |
          ln -s /opt/f15se2/dos
          ln -s /opt/f15se2/bin

      - name: Build UASM
        run: cd UASM && make -j$(nproc)

      - name: Build mzretools
        run: cd mzretools && ./build.sh

      - name: Build reconstruction
        run: make -j$(nproc) start egame end

      - name: Verify start.exe
        run: make verify-start

      - name: Verify egame.exe
        run: make verify-egame

      - name: Verify end.exe
        run: make verify-end

  build-64bit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: cmake -S . -B build64

      - name: Build
        run: cmake --build build64 -j$(nproc)
